name: Deploy to itch.io

on:
  push:
    branches: [main]

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip -q Godot_v4.6.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Import project assets
        run: |
          cd godot
          godot --headless --import 2>&1 || true
          # Run twice to ensure all assets are imported
          godot --headless --import 2>&1 || true

      - name: Export Web build
        run: |
          mkdir -p godot/builds/web
          cd godot
          godot --headless --export-release "Web" builds/web/Disruption.html

      - name: Deploy to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: godot/builds/web
          project: redgalt/disruption
          channel: html5
          api-key: ${{ secrets.BUTLER_API_KEY }}
